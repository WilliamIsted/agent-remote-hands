# CodeQL static analysis.
# C++ runs on windows-latest because the agent compiles with MSVC.
# Python runs on ubuntu-latest (no build required, cheaper runner).

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 6 * * 1'   # Mondays 06:37 UTC — off-peak, low collision

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: cpp
            os: windows-latest
          - language: python
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build windows-modern agent
        if: matrix.language == 'cpp'
        shell: pwsh
        run: |
          cmake -S agents/windows-modern -B agents/windows-modern/build -A x64 -DREMOTE_HANDS_BUILD_TESTS=ON
          cmake --build agents/windows-modern/build --config Release

      - name: Run unit tests
        if: matrix.language == 'cpp'
        shell: pwsh
        run: ctest --test-dir agents/windows-modern/build -C Release --output-on-failure

      - name: Perform CodeQL analysis
        if: success() || failure()
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
