# CodeQL configuration.
#
# `paths-ignore` filters where alerts can be reported, not what gets compiled —
# CodeQL still traces through third-party headers when analysing first-party
# code, but it won't surface alerts located inside the build tree.
#
# The build tree contains FetchContent-fetched third-party sources
# (`_deps/doctest-src/`, etc.) that we don't own and shouldn't patch.

name: "agent-remote-hands CodeQL config"

paths-ignore:
  - agents/windows-modern/build
  - "**/_deps/**"
