name: Bug report
description: Something is broken — verb returns wrong shape, agent crashes, conformance regression, etc.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph statement of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimum steps to reproduce. A wire transcript or `client/hostctl` invocation is ideal.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: agent-build
    attributes:
      label: Agent build
      description: Commit hash or version, plus target OS (e.g. "windows-modern @ a1b2c3d on Win11 23H2").
    validations:
      required: true
  - type: textarea
    id: conformance
    attributes:
      label: Conformance suite output (if relevant)
      description: Output of `python tests/conformance/run.py <host> 8765`.
